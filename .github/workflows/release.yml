name: Build & Publish Release APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Разрешение на создание релизов и загрузку файлов

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Extract Version Name
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | head -n 1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 is missing from GitHub Secrets!"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/release.keystore"

      - name: Build Release APK
        env:
          ENABLE_RELEASE_BUILD: "true"
          KEYSTORE_PATH: "${{ github.workspace }}/release.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon

      - name: Rename & Prepare APK
        run: |
          VERSION_NAME="${{ steps.get_version.outputs.VERSION_NAME }}"
          mkdir -p build-artifacts
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp app/build/outputs/apk/release/app-release.apk "build-artifacts/NightRead-release-v$VERSION_NAME.apk"
            cp app/build/outputs/apk/release/app-release.apk build-artifacts/NightRead-release.apk
            echo "Signed APK successfully copied to build-artifacts/"
          else
            echo "ERROR: Release APK not found at expected path!"
            exit 1
          fi

      - name: Upload to Google Drive
        uses: logickoder/g-drive-upload@main
        with:
          authType: 'oauth'
          clientId: ${{ secrets.GOOGLE_CLIENT_ID }}
          clientSecret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          refreshToken: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          filename: "build-artifacts/NightRead-release-v${{ steps.get_version.outputs.VERSION_NAME }}.apk"
          name: "NightRead-release-v${{ steps.get_version.outputs.VERSION_NAME }}.apk"
          overwrite: 'true'

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/NightRead-release-v${{ steps.get_version.outputs.VERSION_NAME }}.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## NightRead Release ${{ github.ref_name }}
            
            Автоматическая сборка релиза NightRead.
            
            ### Список изменений:
            - Сборка и подпись через автоматический GitHub Actions CI/CD пайплайн.
            - Включена оптимизация и обфускация кода с помощью ProGuard/R8.
            - Использование безопасного хранения подписей в репозитории через GitHub Secrets.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
